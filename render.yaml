services:
  - type: web
    name: autumn-hotel
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push && npx tsx prisma/seed.ts && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
